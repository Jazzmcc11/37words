<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The 37 Words — AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Georgia, serif; }

    /* ── Start overlay ─────────────────────────────── */
    #start-overlay {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      z-index: 9999;
    }
    #start-overlay h1 {
      color: #fff;
      font-size: clamp(28px, 7vw, 48px);
      font-weight: normal;
      letter-spacing: .08em;
      text-align: center;
    }
    #start-overlay p {
      color: rgba(255,255,255,0.55);
      font-size: clamp(12px, 3vw, 15px);
      font-style: italic;
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
    }
    #start-btn {
      background: transparent;
      border: 1px solid rgba(180,20,20,0.7);
      color: rgba(220,60,60,0.9);
      font-family: Georgia, serif;
      font-size: 12px;
      letter-spacing: .36em;
      text-transform: uppercase;
      padding: 15px 48px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(180,20,20,0.28);
      outline: none;
    }
    #start-btn:active {
      border-color: rgba(220,40,40,1);
      color: #ff4444;
    }
    #error-msg {
      color: #ff6666;
      font-size: 13px;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
      display: none;
    }

    /* ── Instructions bar ──────────────────────────── */
    #instructions {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 18px 24px 24px;
      text-align: center;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      letter-spacing: .12em;
      line-height: 1.7;
      pointer-events: none;
      z-index: 1000;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
    }
    #instructions strong {
      display: block;
      color: #fff;
      font-size: 15px;
      margin-bottom: 4px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    /* ── A-Frame scene hidden until camera granted ─── */
    a-scene { display: none; }
  </style>
</head>
<body>

<!-- Start overlay — shown first, removed after camera permission -->
<div id="start-overlay">
  <h1>The 37 Words</h1>
  <p>A WebAR experience.<br>Point your camera at the Hiro marker.</p>
  <button id="start-btn">Tap to Start AR Experience</button>
  <div id="error-msg"></div>
</div>

<div id="instructions">
  <strong>The 37 Words</strong>
  Point your camera at the Hiro marker to enter The 37 Words
</div>

<!-- Scripts must load before a-scene is parsed -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<script>
// Register component before a-scene is in the DOM
AFRAME.registerComponent('cursor-listener', {
  init: function () {
    this.el.addEventListener('click', function () {
      window.open('https://37words.netlify.app', '_blank');
    });
  }
});
</script>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
>
  <!-- Assets -->
  <a-assets>
    <img id="door-img" src="door-transition.png" crossorigin="anonymous">
  </a-assets>

  <!-- Hiro marker -->
  <a-marker preset="hiro" id="hiro-marker">

    <!-- Door panel — 1.5 × 2, centred above marker -->
    <a-image
      id="door-panel"
      src="#door-img"
      width="1.5" height="2"
      position="0 1.2 0"
      rotation="-90 0 0"
      material="transparent: true; alphaTest: 0.05;"
      class="clickable"
      cursor-listener
    ></a-image>

    <!-- Pulsing glow plane behind the door -->
    <a-plane
      width="1.7" height="2.2"
      position="0 1.2 -0.01"
      rotation="-90 0 0"
      material="color: #ffffff; transparent: true; opacity: 0.0; shader: flat;"
      animation="property: material.opacity; from: 0.0; to: 0.22; dir: alternate; dur: 1100; easing: easeInOutSine; loop: true;"
    ></a-plane>

    <!-- Floating words -->
    <a-text value="No person" color="#ffffff" align="center"
      position="-0.9 1.9 0" rotation="-90 0 0"
      width="2" font="https://cdn.aframe.io/fonts/KelsonSans.fnt"
      material="shader: flat;"
      animation="property: material.opacity; from: 0.55; to: 1.0; dir: alternate; dur: 1800; easing: easeInOutSine; loop: true;"
    ></a-text>

    <a-text value="in the United States" color="#ffffff" align="center"
      position="0 2.35 0" rotation="-90 0 0"
      width="2.4" font="https://cdn.aframe.io/fonts/KelsonSans.fnt"
      material="shader: flat;"
      animation="property: material.opacity; from: 0.45; to: 0.95; dir: alternate; dur: 2200; easing: easeInOutSine; loop: true;"
    ></a-text>

    <a-text value="shall" color="#ffffff" align="center"
      position="0.95 1.9 0" rotation="-90 0 0"
      width="1.6" font="https://cdn.aframe.io/fonts/KelsonSans.fnt"
      material="shader: flat;"
      animation="property: material.opacity; from: 0.5; to: 1.0; dir: alternate; dur: 1500; easing: easeInOutSine; loop: true;"
    ></a-text>

    <a-text value="on the basis of sex" color="rgba(200,200,255,1)" align="center"
      position="-0.7 0.55 0" rotation="-90 0 0"
      width="2" font="https://cdn.aframe.io/fonts/KelsonSans.fnt"
      material="shader: flat;"
      animation="property: material.opacity; from: 0.3; to: 0.8; dir: alternate; dur: 2600; easing: easeInOutSine; loop: true;"
    ></a-text>

    <a-text value="be excluded" color="rgba(200,200,255,1)" align="center"
      position="0.8 0.55 0" rotation="-90 0 0"
      width="1.8" font="https://cdn.aframe.io/fonts/KelsonSans.fnt"
      material="shader: flat;"
      animation="property: material.opacity; from: 0.3; to: 0.75; dir: alternate; dur: 2900; easing: easeInOutSine; loop: true;"
    ></a-text>

    <!-- Label below the door -->
    <a-text
      value="The 37 Words  ·  Title IX  ·  1972"
      color="rgba(220,180,180,1)"
      align="center"
      position="0 0.08 0"
      rotation="-90 0 0"
      width="2.8"
      font="https://cdn.aframe.io/fonts/KelsonSans.fnt"
      material="shader: flat;"
      animation="property: material.opacity; from: 0.5; to: 0.9; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true;"
    ></a-text>

  </a-marker>

  <!-- Camera with raycaster for tap-to-click -->
  <a-entity camera>
    <a-entity
      cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable; far: 100;"
    ></a-entity>
  </a-entity>

</a-scene>

<script>
(function () {
  const btn      = document.getElementById('start-btn');
  const overlay  = document.getElementById('start-overlay');
  const scene    = document.querySelector('a-scene');
  const errorMsg = document.getElementById('error-msg');

  btn.addEventListener('click', function () {
    btn.disabled = true;
    btn.textContent = 'Starting…';
    errorMsg.style.display = 'none';

    // Request camera — this is what Safari iOS requires a user gesture for
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
      .then(function (stream) {
        // Stop the test stream — AR.js will open its own
        stream.getTracks().forEach(function (t) { t.stop(); });

        // Show the AR scene
        scene.style.display = 'block';
        overlay.style.display = 'none';
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = 'Tap to Start AR Experience';
        errorMsg.style.display = 'block';
        if (err.name === 'NotAllowedError') {
          errorMsg.textContent = 'Camera access denied. Please allow camera access in your browser settings and try again.';
        } else if (err.name === 'NotFoundError') {
          errorMsg.textContent = 'No camera found on this device.';
        } else {
          errorMsg.textContent = 'Could not access camera: ' + err.message;
        }
      });
  });
})();
</script>

</body>
</html>
