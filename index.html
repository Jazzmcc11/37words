<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room 01 — The Promise</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Landing ─────────────────────────────────── */

    #landing {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 52px; background: #000; z-index: 100;
      transition: opacity 2.8s ease;
    }
    #landing.out { opacity: 0; pointer-events: none; }

    .eyebrow {
      font-size: 10px; letter-spacing: .48em;
      text-transform: uppercase; color: rgba(255,255,255,.20);
    }

    #enter-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.28);
      color: rgba(255,255,255,.72);
      font-family: Georgia, serif; font-size: 12px;
      letter-spacing: .32em; text-transform: uppercase;
      padding: 15px 56px; cursor: pointer;
      transition: border-color .4s ease, color .4s ease;
      outline: none;
    }
    #enter-btn:hover { border-color: rgba(255,255,255,.78); color: #fff; }

    /* ── Black transition overlay ─────────────────── */

    #veil {
      position: fixed; inset: 0;
      background: #000; z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity 0.65s ease;
    }
    #veil.on       { opacity: 1; pointer-events: all; }
    #veil.white    { background: #fff; }

    /* ── Back button (Room 01 only) ───────────────── */

    #back-btn {
      position: fixed; top: 24px; left: 24px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.55);
      font-family: Georgia, serif; font-size: 10px;
      letter-spacing: .28em; text-transform: uppercase;
      padding: 9px 22px; cursor: pointer; z-index: 50;
      display: none;
      transition: border-color .35s, color .35s;
      outline: none;
    }
    #back-btn:hover { border-color: rgba(255,255,255,.7); color: #fff; }

    /* ── Tooltip (hover over clickable clause) ────── */

    #clause-tip {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% + 3.8rem));
      font-size: 9px; letter-spacing: .32em;
      text-transform: uppercase;
      color: rgba(255,255,255,.38);
      opacity: 0; pointer-events: none; z-index: 50;
      transition: opacity .3s ease;
    }

    /* ── HUD ──────────────────────────────────────── */

    #hud {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      z-index: 10; pointer-events: none; user-select: none;
    }

    #hint {
      font-size: 9px; letter-spacing: .32em;
      text-transform: uppercase;
      color: rgba(255,255,255,.18);
      opacity: 0; transition: opacity 1.8s ease;
    }

    #room-tag {
      font-size: 9px; letter-spacing: .44em;
      text-transform: uppercase;
      color: rgba(255,255,255,.12);
      opacity: 0; transition: opacity 2s ease 1.2s;
    }

    canvas { display: block; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    canvas.hovering { cursor: pointer; }

    /* ── Warm amber overlay — fades in for Room 03 onward ── */
    #warmth {
      position: fixed; inset: 0;
      background: rgba(255, 160, 50, 0.09);
      pointer-events: none; z-index: 5;
      opacity: 0; transition: opacity 2.5s ease;
    }
  </style>
</head>

<!-- Audio -->

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
'use strict';

/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */

const WORDS = [
  'No','person','in','the','United','States','shall',      // 0-6
  'on','the','basis','of','sex',                            // 7-11
  'be','excluded','from','participation','in',              // 12-16
  'be','denied','the','benefits','of',                      // 17-21
  'or','be','subjected','to','discrimination',              // 22-26
  'under','any','education','program','or','activity',      // 27-32
  'receiving','Federal','financial','assistance'            // 33-36
];

// Void clauses — first entry is the special clickable portal to Room 01
const VOID_CLAUSES = [
  { text:'No person in the United States\nshall', bright:1.00, mul:1.85, clickable:true },
  { text:'on the basis of sex',                   bright:1.00, mul:1.72 },
  { text:'be excluded\nfrom participation in',    bright:0.91, mul:1.42 },
  { text:'be denied\nthe benefits of',            bright:0.91, mul:1.42 },
  { text:'or be subjected to discrimination\nunder any education program or\nactivity receiving Federal\nfinancial assistance', bright:0.86, mul:1.15 },
];

// Room 01 — 4 depth layers, semantically assigned
const R01_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:42, fMax:54, oMin:0.78, oMax:0.96 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:30, fMax:40, oMin:0.48, oMax:0.68 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:22, fMax:30, oMin:0.24, oMax:0.40 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:14, fMax:22, oMin:0.07, oMax:0.19 },
];

// Room 03 — slightly warmer/brighter than R02, hopeful opening
const R03_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:42, fMax:54, oMin:0.70, oMax:0.90 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:30, fMax:40, oMin:0.42, oMax:0.60 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:22, fMax:30, oMin:0.20, oMax:0.34 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:14, fMax:22, oMin:0.06, oMax:0.16 },
];

// Room 02 — same word distribution, slightly darker to feel more urgent
const R02_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:40, fMax:52, oMin:0.62, oMax:0.84 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:28, fMax:38, oMin:0.36, oMax:0.54 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:20, fMax:28, oMin:0.16, oMax:0.28 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:12, fMax:20, oMin:0.05, oMax:0.14 },
];


/* ═══════════════════════════════════════════
   THREE.JS CORE
═══════════════════════════════════════════ */

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Two scenes
const voidScene = new THREE.Scene();
voidScene.background = new THREE.Color(0x000000);
voidScene.fog = new THREE.FogExp2(0x000000, 0.037);

const r01Scene = new THREE.Scene();
r01Scene.background = new THREE.Color(0x000000);

const r02Scene = new THREE.Scene();
r02Scene.background = new THREE.Color(0x000000);

const r03Scene = new THREE.Scene();
r03Scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);

let activeScene = voidScene;

/* ═══════════════════════════════════════════
   LOOK CONTROLS
═══════════════════════════════════════════ */

let yaw = 0, pitch = 0, tYaw = 0, tPitch = 0;
let dragging = false, lx = 0, ly = 0, idleRotate = true;
let dragMovedPx = 0, mouseDownX = 0, mouseDownY = 0;
const cvs = renderer.domElement;

function startDrag(x, y) {
  dragging = true; idleRotate = false;
  lx = x; ly = y;
  mouseDownX = x; mouseDownY = y;
  dragMovedPx = 0;
  cvs.classList.add('dragging');
}
function moveDrag(x, y) {
  if (!dragging) return;
  const dx = x - lx, dy = y - ly;
  tYaw   -= dx * 0.0032;
  tPitch -= dy * 0.0032;
  tPitch  = Math.max(-1.35, Math.min(1.35, tPitch));
  lx = x; ly = y;
  dragMovedPx += Math.sqrt(dx*dx + dy*dy);
}
function endDrag(x, y) {
  dragging = false;
  cvs.classList.remove('dragging');
  // If barely moved, treat as a click
  if (dragMovedPx < 6) handleClick(x, y);
}

cvs.addEventListener('mousedown',  e => startDrag(e.clientX, e.clientY));
window.addEventListener('mousemove', e => {
  moveDrag(e.clientX, e.clientY);
  if (!dragging) handleHover(e.clientX, e.clientY);
});
window.addEventListener('mouseup', e => endDrag(e.clientX, e.clientY));
cvs.addEventListener('touchstart', e => {
  const t = e.touches[0]; startDrag(t.clientX, t.clientY);
}, { passive: true });
window.addEventListener('touchmove', e => {
  const t = e.touches[0]; moveDrag(t.clientX, t.clientY);
}, { passive: true });
window.addEventListener('touchend', e => {
  const t = e.changedTouches[0]; endDrag(t.clientX, t.clientY);
});

/* ═══════════════════════════════════════════
   SPRITE FACTORY
═══════════════════════════════════════════ */

const DPR  = Math.min(window.devicePixelRatio, 2);
const KSCL = 1 / (DPR * 245);

function mkSprite(text, { fontSize = 42, bright = 0.75, italic = false, glow = false } = {}) {
  const fs    = fontSize * DPR;
  const font  = `${italic ? 'italic ' : ''}${fs}px Georgia, serif`;
  const lh    = fs * 1.38;
  const glowPad = glow ? fs * 0.65 : 0;
  const px    = fs * 0.36 + glowPad;
  const py    = fs * 0.28 + glowPad;
  const lines = text.split('\n');

  const probe = document.createElement('canvas').getContext('2d');
  probe.font  = font;
  let maxW    = 0;
  for (const l of lines) { const w = probe.measureText(l).width; if (w > maxW) maxW = w; }

  const cw = Math.ceil(maxW + px * 2);
  const ch = Math.ceil(lh * lines.length + py * 2);
  const cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  const ctx = cv.getContext('2d');
  ctx.font  = font;

  const g = Math.round(bright * 255);
  ctx.fillStyle    = `rgb(${g},${g},${g})`;
  ctx.textBaseline = 'top';

  // Glow: multi-pass shadow rendering
  if (glow) {
    ctx.shadowColor = `rgb(${g},${g},${g})`;
    ctx.shadowBlur  = fs * 0.55;
    for (let pass = 0; pass < 3; pass++) {
      for (let i = 0; i < lines.length; i++) {
        const lw = ctx.measureText(lines[i]).width;
        ctx.fillText(lines[i], (cw - lw) * 0.5, py + i * lh);
      }
    }
    ctx.shadowBlur = 0;
  }

  // Crisp final pass
  for (let i = 0; i < lines.length; i++) {
    const lw = ctx.measureText(lines[i]).width;
    ctx.fillText(lines[i], (cw - lw) * 0.5, py + i * lh);
  }

  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity: 0, depthWrite: false
  });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(cw * KSCL, ch * KSCL, 1);
  return sp;
}

/* ═══════════════════════════════════════════
   GRAYSCALE PLANE FACTORY
   Shared ShaderMaterial for both panels so
   colours are always stripped to greyscale.
═══════════════════════════════════════════ */

const GREY_VERT = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const GREY_FRAG = `
  uniform sampler2D uTex;
  uniform float uBright;
  varying vec2 vUv;
  void main() {
    vec4 c = texture2D(uTex, vUv);
    float g = dot(c.rgb, vec3(0.299, 0.587, 0.114)) * uBright;
    gl_FragColor = vec4(g, g, g, c.a);
  }
`;

function mkGreyMesh(tex, w, h, bright) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTex: { value: tex }, uBright: { value: bright } },
    vertexShader: GREY_VERT,
    fragmentShader: GREY_FRAG,
    side: THREE.FrontSide,
  });
  return new THREE.Mesh(geo, mat);
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */

function rndSphere(r0, r1) {
  const r = r0 + Math.random() * (r1 - r0);
  const u = Math.random() * Math.PI * 2;
  const v = Math.acos(2 * Math.random() - 1);
  return new THREE.Vector3(
    r * Math.sin(v) * Math.cos(u),
    r * Math.sin(v) * Math.sin(u),
    r * Math.cos(v)
  );
}

// Void-specific: words appear in a volume in front of the user
function rndVoidPos() {
  return new THREE.Vector3(
    -8 + Math.random() * 16,     // x: -8 to 8
    0.5 + Math.random() * 3.5,   // y: 0.5 to 4
    -(5 + Math.random() * 20)    // z: -5 to -25
  );
}

function ndcFromEvent(cx, cy) {
  return new THREE.Vector2(
    (cx / window.innerWidth)  *  2 - 1,
    (cy / window.innerHeight) * -2 + 1
  );
}

/* ═══════════════════════════════════════════
   VOID SCENE
═══════════════════════════════════════════ */

// voidItems: { sp, tOp, bp, ph, phY, spd, amp, active }
// active is set true by setTimeout in startVoidSequence()
const voidItems   = [];
let   clickableSp = null;
const raycaster   = new THREE.Raycaster();

// ── 37 individual words
// Pre-created at opacity 0; activated via setTimeout on enter
WORDS.forEach((word) => {
  const bright = 0.72 + Math.random() * 0.25;
  const fSize  = 48 + Math.floor(Math.random() * 20);
  const sp     = mkSprite(word, { fontSize: fSize, bright });
  const bp     = rndVoidPos();
  sp.position.copy(bp);
  voidScene.add(sp);
  voidItems.push({
    sp,
    tOp: 0.70 + Math.random() * 0.28,
    bp:  bp.clone(),
    ph:  Math.random() * Math.PI * 2,
    phY: Math.random() * Math.PI * 2,
    spd: 0.12 + Math.random() * 0.18,
    amp: 0.10 + Math.random() * 0.22,
    active: false,
  });
});

// ── 5 clause phrases (index into voidItems: 37..41)
// Clause 0 is the clickable portal to Room 01 — width 7.5 world units
// Others normalized to width 5 world units
VOID_CLAUSES.forEach((c) => {
  const sp = mkSprite(c.text, {
    fontSize: 52, bright: c.bright, italic: !c.clickable,
    glow: true
  });
  const bp = rndVoidPos();
  sp.position.copy(bp);

  // Normalize world-space width
  const targetW = c.clickable ? 7.5 : 5.0;
  const aspect  = sp.scale.y / sp.scale.x;
  sp.scale.set(targetW, targetW * aspect, 1);

  voidScene.add(sp);
  const entry = {
    sp,
    tOp:  c.bright * (c.clickable ? 1.0 : 0.97),
    bp:   bp.clone(),
    ph:   Math.random() * Math.PI * 2,
    phY:  Math.random() * Math.PI * 2,
    spd:  c.clickable ? 0.05 : 0.07 + Math.random() * 0.10,
    amp:  c.clickable ? 0.07 : 0.05 + Math.random() * 0.08,
    active: false,
    isClickable: !!c.clickable,
  };
  voidItems.push(entry);
  if (c.clickable) clickableSp = sp;
});

/* ═══════════════════════════════════════════
   ROOM 01 SCENE
═══════════════════════════════════════════ */

const r01Items       = [];
const r01Meshes      = [];
let   r01HeroSp      = null;
let   r01Built       = false;
let   r01VideoEl     = null;
let   r01DoorGroup   = null;
let   r01DoorGlowMat = null;
let   r01DoorHitBox  = null;

/* ═══════════════════════════════════════════
   ROOM 02 STATE
═══════════════════════════════════════════ */

const r02Items       = [];
const r02Meshes      = [];
let   r02HeroSp      = null;
let   r02Built       = false;
let   r02VideoEl     = null;
let   r02DoorGroup   = null;
let   r02DoorGlowMat = null;
let   r02DoorHitBox  = null;

function buildRoom01() {
  if (r01Built) return;
  r01Built = true;

  // ── Back wall — room01-wall.png as a flat plane filling the user's view
  function addBackWall(imgEl) {
    const tex = new THREE.Texture(imgEl);
    tex.needsUpdate = true;
    const geo = new THREE.PlaneGeometry(14, 8);
    const mat = new THREE.ShaderMaterial({
      uniforms: { uTex: { value: tex } },
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
      `,
      fragmentShader: `
        uniform sampler2D uTex;
        varying vec2 vUv;
        void main() {
          vec4 c = texture2D(uTex, vUv);
          float g = dot(c.rgb, vec3(0.299, 0.587, 0.114));
          gl_FragColor = vec4(g, g, g, 1.0);
        }
      `,
      side: THREE.FrontSide,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(0, 1.8, -8);
    r01Scene.add(mesh);
  }

  const skyImg = document.getElementById('r01sky');
  if (skyImg.complete && skyImg.naturalWidth > 0) {
    addBackWall(skyImg);
  } else {
    skyImg.onload  = () => addBackWall(skyImg);
    skyImg.onerror = () => { /* image missing — black background */ };
  }

  // ── Hero clause — "No person in the United States\nshall"
  r01HeroSp = mkSprite('No person in the United States\nshall', {
    fontSize: 52, bright: 1.0, glow: true
  });
  r01HeroSp.scale.multiplyScalar(1.5);
  r01HeroSp.position.set(0, 3.5, -7.0);
  r01HeroSp.material.opacity = 0;
  r01Scene.add(r01HeroSp);

  // ── 37 words at 4 depth layers
  R01_LAYERS.forEach((layer, li) => {
    layer.idx.forEach((wordIdx) => {
      const bright = layer.oMin + Math.random() * (layer.oMax - layer.oMin);
      const fSize  = layer.fMin + Math.floor(Math.random() * (layer.fMax - layer.fMin));
      const sp     = mkSprite(WORDS[wordIdx], { fontSize: fSize, bright });
      const bp     = rndSphere(layer.rMin, layer.rMax);
      sp.position.copy(bp);
      r01Scene.add(sp);
      r01Items.push({
        sp,
        delay: 0.3 + li * 0.6 + Math.random() * 1.2,
        tOp:   bright,
        bp:    bp.clone(),
        ph:    Math.random() * Math.PI * 2,
        phY:   Math.random() * Math.PI * 2,
        spd:   0.10 + Math.random() * 0.20,
        amp:   layer.rMin * 0.022 + Math.random() * 0.10,
      });
    });
  });

  // ── RIGHT PANEL — floating TV showing room01-video.mp4
  // Starts muted; audio sequence plays ambient first, then unmutes video on ended
  const videoEl = document.createElement('video');
  videoEl.setAttribute('src',         'room01-video.mp4');
  videoEl.setAttribute('muted',       '');
  videoEl.setAttribute('loop',        '');
  videoEl.setAttribute('playsinline', '');
  videoEl.muted       = true;   // IDL property must also be set for Chrome
  videoEl.loop        = true;
  videoEl.playsInline = true;
  videoEl.crossOrigin = 'anonymous';
  // Append to DOM (hidden) — required for autoplay policy on some browsers
  videoEl.style.display = 'none';
  document.body.appendChild(videoEl);

  // Store ref so we can play/pause with the room
  r01VideoEl = videoEl;

  const videoTex = new THREE.VideoTexture(videoEl);
  videoTex.minFilter = THREE.LinearFilter;
  videoTex.magFilter = THREE.LinearFilter;

  // Video panel: 4 wide × 3 tall, left side
  const tvPanel = mkGreyMesh(videoTex, 4.0, 3.0, 0.80);

  // Bezel: 0.18 wider/taller, sits just behind
  const bezelGeo = new THREE.PlaneGeometry(4.18, 3.18);
  const bezelMat = new THREE.MeshBasicMaterial({ color: 0x0d0d0d, side: THREE.FrontSide });
  const bezel    = new THREE.Mesh(bezelGeo, bezelMat);
  bezel.position.set(-5, 1.8, -7.01);
  bezel.rotation.y = 0;
  r01Scene.add(bezel);

  tvPanel.position.set(-5, 1.8, -7);
  tvPanel.rotation.y = 0;
  tvPanel.userData = { bobPhase: 0.8, bobAmp: 0.055, rotPhase: 1.1 };
  r01Scene.add(tvPanel);
  r01Meshes.push(tvPanel);
  r01Meshes.push(bezel);

  bezel.userData = { bobPhase: 0.8, bobAmp: 0.055, rotPhase: 1.1 };

  // ── RIGHT PANEL — newspaper image (room01-paper1.jpeg) with aged overlay

/* ═══════════════════════════════════════════
   VOID WORD SCHEDULE
   Called once when user enters the void.
   Activates each word/clause via setTimeout
   in sync with the audio (~0.4 s per word).
═══════════════════════════════════════════ */

// Audio starts at 850 ms after button click.
// Words fire at 850 + wordIndex * 400 ms.
// Clauses fire 300 ms after their last constituent word.
const AUDIO_START_MS   = 850;
const WORD_INTERVAL_MS = 400;

// Word-index boundaries for each clause in VOID_CLAUSES
const CLAUSE_LAST_WORD = [6, 11, 16, 21, 36]; // index of each clause's last word in WORDS[]

function startVoidSequence() {
  playEntryAudio();

  // Individual words (voidItems 0..36)
  WORDS.forEach((_, i) => {
    const ms = AUDIO_START_MS + i * WORD_INTERVAL_MS;
    setTimeout(() => { voidItems[i].active = true; }, ms);
  });

  // Clause phrases (voidItems 37..41)
  VOID_CLAUSES.forEach((_, ci) => {
    const lastWordIdx = CLAUSE_LAST_WORD[ci];
    const ms = AUDIO_START_MS + lastWordIdx * WORD_INTERVAL_MS + 300;
    setTimeout(() => { voidItems[37 + ci].active = true; }, ms);
  });
}

═══════════════════════════════════════════ */

let isHoveringClause = false;
let isHoveringDoor   = false;

function handleHover(cx, cy) {
  raycaster.setFromCamera(ndcFromEvent(cx, cy), camera);

  if (activeScene === voidScene && clickableSp && clickableSp.material.opacity > 0.1) {
    const hits = raycaster.intersectObject(clickableSp);
    const hit  = hits.length > 0;
    if (hit !== isHoveringClause) {
      isHoveringClause = hit;
      cvs.classList.toggle('hovering', hit && !isHoveringDoor);
      document.getElementById('clause-tip').style.opacity = hit ? '1' : '0';
    }
  }

  if (activeScene === r01Scene && r01DoorHitBox) {
    const hits = raycaster.intersectObject(r01DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r02Scene && r02DoorHitBox) {
    const hits = raycaster.intersectObject(r02DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r03Scene && r03DoorHitBox) {
    const hits = raycaster.intersectObject(r03DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }
}

function handleClick(cx, cy) {
  raycaster.setFromCamera(ndcFromEvent(cx, cy), camera);

  if (activeScene === voidScene && clickableSp && clickableSp.material.opacity > 0.1) {
    const hits = raycaster.intersectObject(clickableSp);
    if (hits.length > 0) { enterRoom01(); return; }
  }

  if (activeScene === r01Scene && r01DoorHitBox) {
    const hits = raycaster.intersectObject(r01DoorHitBox);
    if (hits.length > 0) { enterRoom02(); return; }
  }

  if (activeScene === r02Scene && r02DoorHitBox) {
    const hits = raycaster.intersectObject(r02DoorHitBox);
    if (hits.length > 0) { enterRoom03(); return; }
  }

  if (activeScene === r03Scene && r03DoorHitBox) {
    const hits = raycaster.intersectObject(r03DoorHitBox);
    if (hits.length > 0) enterRoom04();
  }
}

/* ═══════════════════════════════════════════
   ANIMATION LOOP
═══════════════════════════════════════════ */

let voidActive = false;
let voidT0     = null;

(function loop(ts) {
  requestAnimationFrame(loop);

  // ── Camera look smooth
  if (idleRotate && activeScene === voidScene && voidActive) tYaw += 0.000125;
  yaw   += (tYaw   - yaw)   * 0.062;
  pitch += (tPitch - pitch) * 0.062;
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // ── VOID scene updates
  if (activeScene === voidScene && voidActive) {
    if (voidT0 === null) voidT0 = ts;
    const t = (ts - voidT0) * 0.001;

    for (const d of voidItems) {
      const mat = d.sp.material;
      if (d.active && mat.opacity < d.tOp) {
        mat.opacity = Math.min(d.tOp, mat.opacity + 0.009);
      }
      if (mat.opacity > 0.001) {
        const s = t * d.spd;
        d.sp.position.x = d.bp.x + Math.sin(s         + d.ph)  * d.amp;
        d.sp.position.y = d.bp.y + Math.cos(s * 0.63   + d.phY) * d.amp * 0.75;
        d.sp.position.z = d.bp.z + Math.sin(s * 0.47   + d.ph + 1.8) * d.amp * 0.55;
      }
    }

    // Pulse the clickable clause once it has appeared
    if (clickableSp && clickableSp.material.opacity > 0.05) {
      const baseOp = VOID_CLAUSES[0].bright;
      clickableSp.material.opacity = baseOp * (0.78 + 0.22 * Math.sin(ts * 0.0015));
    }
  }

  // ── ROOM 01 scene updates
  if (activeScene === r01Scene) {
    if (r01T0 === null) r01T0 = ts;
    const t = (ts - r01T0) * 0.001;

    // Hero clause — fade in, then steady pulse
    if (r01HeroSp) {
      const heroCurrent = r01HeroSp.material.opacity;
      if (heroCurrent < 0.98) {
        r01HeroSp.material.opacity = Math.min(0.98, heroCurrent + 0.006);
      } else {
        // Settled: gentle breathe 0.86–0.98
        r01HeroSp.material.opacity = 0.86 + 0.12 * (0.5 + 0.5 * Math.sin(t * 0.9));
      }
      // Subtle vertical float
      r01HeroSp.position.y = 3.5 + Math.sin(t * 0.22) * 0.08;
    }

    // Word sprites
    for (const d of r01Items) {
      const mat = d.sp.material;
      if (t > d.delay && mat.opacity < d.tOp) {
        mat.opacity = Math.min(d.tOp, mat.opacity + 0.006);
      }
      if (mat.opacity > 0.001) {
        const s = t * d.spd;
        d.sp.position.x = d.bp.x + Math.sin(s        + d.ph)  * d.amp;
        d.sp.position.y = d.bp.y + Math.cos(s * 0.63  + d.phY) * d.amp * 0.75;
        d.sp.position.z = d.bp.z + Math.sin(s * 0.47  + d.ph + 1.8) * d.amp * 0.55;
      }
    }

    // Newspaper card bob + subtle yaw sway
    for (const mesh of r01Meshes) {
      const ud = mesh.userData;
      mesh.position.y = ud.initialY + Math.sin(t * 0.38 + ud.bobPhase) * ud.bobAmp;
      mesh.rotation.y = ud.baseRotY  + Math.sin(t * 0.25 + ud.rotPhase) * 0.04;
    }

    // Wall edge glow — only pulses after 60s, brightens on hover
    if (r01DoorGlowMat) {
      if (r01WallGlowActive || isHoveringDoor) {
        const base  = isHoveringDoor ? 0.70 : 0.30;
        const range = isHoveringDoor ? 0.25 : 0.22;
        const glow  = base + range * Math.sin(t * 1.6);
        r01DoorGlowMat.opacity = glow;
        // bloom plane (stored as r01DoorGroup mesh)
        if (r01DoorGroup && r01DoorGroup.material) {
          r01DoorGroup.material.opacity = glow * 0.12;
        }
      } else {
        r01DoorGlowMat.opacity = 0;
        if (r01DoorGroup && r01DoorGroup.material) r01DoorGroup.material.opacity = 0;
      }
    }
  }

  // ── ROOM 02 scene updates
  if (activeScene === r02Scene) {
    if (r02T0 === null) r02T0 = ts;
    const t = (ts - r02T0) * 0.001;

    // Hero clause — fade in, then urgent breathe
    if (r02HeroSp) {
      const heroCurrent = r02HeroSp.material.opacity;
      if (heroCurrent < 0.98) {
        r02HeroSp.material.opacity = Math.min(0.98, heroCurrent + 0.007);
      } else {
        r02HeroSp.material.opacity = 0.82 + 0.16 * (0.5 + 0.5 * Math.sin(t * 1.1));
      }
      r02HeroSp.position.y = 3.5 + Math.sin(t * 0.28) * 0.07;
    }

    // Word sprites
    for (const d of r02Items) {
      const mat = d.sp.material;
      if (t > d.delay && mat.opacity < d.tOp) {
        mat.opacity = Math.min(d.tOp, mat.opacity + 0.006);
      }
      if (mat.opacity > 0.001) {
        const s = t * d.spd;
        d.sp.position.x = d.bp.x + Math.sin(s        + d.ph)  * d.amp;
        d.sp.position.y = d.bp.y + Math.cos(s * 0.63  + d.phY) * d.amp * 0.75;
        d.sp.position.z = d.bp.z + Math.sin(s * 0.47  + d.ph + 1.8) * d.amp * 0.55;
      }
    }

    // Panel bob + subtle sway
    for (const mesh of r02Meshes) {
      const ud = mesh.userData;
      if (ud.initialY !== undefined) {
        mesh.position.y = ud.initialY + Math.sin(t * 0.38 + ud.bobPhase) * ud.bobAmp;
        mesh.rotation.y = ud.baseRotY  + Math.sin(t * 0.25 + ud.rotPhase) * 0.04;
      }
    }

    // Wall edge glow
    if (r02DoorGlowMat) {
      if (r02WallGlowActive || isHoveringDoor) {
        const base  = isHoveringDoor ? 0.70 : 0.30;
        const range = isHoveringDoor ? 0.25 : 0.22;
        const glow  = base + range * Math.sin(t * 1.6);
        r02DoorGlowMat.opacity = glow;
        if (r02DoorGroup && r02DoorGroup.material) {
          r02DoorGroup.material.opacity = glow * 0.12;
        }
      } else {
        r02DoorGlowMat.opacity = 0;
        if (r02DoorGroup && r02DoorGroup.material) r02DoorGroup.material.opacity = 0;
      }
    }
  }

  // ── ROOM 03 scene updates
  if (activeScene === r03Scene) {
    if (r03T0 === null) r03T0 = ts;
    const t = (ts - r03T0) * 0.001;

    // Hero clause — fade in, then hopeful slow breathe
    if (r03HeroSp) {
      const heroCurrent = r03HeroSp.material.opacity;
      if (heroCurrent < 0.98) {
        r03HeroSp.material.opacity = Math.min(0.98, heroCurrent + 0.006);
      } else {
        r03HeroSp.material.opacity = 0.88 + 0.10 * (0.5 + 0.5 * Math.sin(t * 0.8));
      }
      r03HeroSp.position.y = 3.5 + Math.sin(t * 0.20) * 0.09;
    }

    // Word sprites
    for (const d of r03Items) {
      const mat = d.sp.material;
      if (t > d.delay && mat.opacity < d.tOp) {
        mat.opacity = Math.min(d.tOp, mat.opacity + 0.006);
      }
      if (mat.opacity > 0.001) {
        const s = t * d.spd;
        d.sp.position.x = d.bp.x + Math.sin(s        + d.ph)  * d.amp;
        d.sp.position.y = d.bp.y + Math.cos(s * 0.63  + d.phY) * d.amp * 0.75;
        d.sp.position.z = d.bp.z + Math.sin(s * 0.47  + d.ph + 1.8) * d.amp * 0.55;
      }
    }

    // Panel bob + subtle sway
    for (const mesh of r03Meshes) {
      const ud = mesh.userData;
      if (ud.initialY !== undefined) {
        mesh.position.y = ud.initialY + Math.sin(t * 0.38 + ud.bobPhase) * ud.bobAmp;
        mesh.rotation.y = ud.baseRotY  + Math.sin(t * 0.25 + ud.rotPhase) * 0.04;
      }
    }

    // Wall edge glow
    if (r03DoorGlowMat) {
      if (r03WallGlowActive || isHoveringDoor) {
        const base  = isHoveringDoor ? 0.70 : 0.30;
        const range = isHoveringDoor ? 0.25 : 0.22;
        const glow  = base + range * Math.sin(t * 1.6);
        r03DoorGlowMat.opacity = glow;
        if (r03DoorGroup && r03DoorGroup.material) {
          r03DoorGroup.material.opacity = glow * 0.12;
        }
      } else {
        r03DoorGlowMat.opacity = 0;
        if (r03DoorGroup && r03DoorGroup.material) r03DoorGroup.material.opacity = 0;
      }
    }
  }

  renderer.render(activeScene, camera);
})(0);


/* ═══════════════════════════════════════════
   ENTER SEQUENCE
═══════════════════════════════════════════ */

document.getElementById('enter-btn').addEventListener('click', () => {
  document.getElementById('landing').classList.add('out');

  voidActive = true;
  idleRotate = true;

  // Start audio + schedule word appearances
  startVoidSequence();

  setTimeout(() => {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('room-tag').style.opacity = '1';
    const hint = document.getElementById('hint');
    hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; }, 9000);
  }, 2900);
});

document.getElementById('back-btn').addEventListener('click', () => {
  if (activeScene === r03Scene) returnToRoom02();
  else if (activeScene === r02Scene) returnToRoom01();
  else returnToVoid();
});

/* ═══════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════ */

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>
