    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Landing ─────────────────────────────────── */

    #landing {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; z-index: 100;
      background: #000;
      transition: opacity 2.8s ease;
    }
    #landing.out { opacity: 0; pointer-events: none; }

    /* Fullscreen background video */
    #landing-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.55;
      pointer-events: none;
    }

    /* Text stack — centered over video */
    #landing-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      padding-bottom: 120px;
    }

    #landing-title {
      font-family: Georgia, serif;
      font-size: clamp(48px, 8vw, 88px);
      font-weight: normal;
      color: #fff;
      letter-spacing: .06em;
      text-align: center;
      opacity: 0; transition: opacity 1.4s ease;
      text-shadow: 0 2px 32px rgba(0,0,0,0.9);
    }
    #landing-subtitle {
      font-family: Georgia, serif;
      font-size: clamp(13px, 2vw, 18px);
      color: #cc2222;
      letter-spacing: .22em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0; transition: opacity 1.4s ease;
      text-shadow: 0 1px 16px rgba(0,0,0,0.8);
    }
    #landing-tagline {
      font-family: Georgia, serif;
      font-size: clamp(11px, 1.4vw, 15px);
      font-style: italic;
      color: rgba(200,200,200,0.72);
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
      opacity: 0; transition: opacity 1.4s ease;
      text-shadow: 0 1px 12px rgba(0,0,0,0.9);
    }

    /* Enter button — fixed bottom center */
    #enter-btn {
      position: absolute; bottom: 60px; left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      background: transparent;
      border: 1px solid rgba(180,20,20,0.7);
      color: rgba(220,60,60,0.9);
      font-family: Georgia, serif; font-size: 12px;
      letter-spacing: .36em; text-transform: uppercase;
      padding: 15px 56px; cursor: pointer;
      box-shadow: 0 0 18px rgba(180,20,20,0.28), inset 0 0 18px rgba(180,20,20,0.06);
      transition: border-color .4s ease, color .4s ease, box-shadow .4s ease;
      outline: none;
      opacity: 0; transition: opacity 1.4s ease, border-color .4s ease, color .4s ease, box-shadow .4s ease;
    }
    #enter-btn:hover {
      border-color: rgba(220,40,40,1);
      color: #ff4444;
      box-shadow: 0 0 32px rgba(200,20,20,0.55), inset 0 0 24px rgba(180,20,20,0.12);
    }

    /* ── Black transition overlay ─────────────────── */

    #veil {
      position: fixed; inset: 0;
      background: #000; z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity 0.65s ease;
    }
    #veil.on       { opacity: 1; pointer-events: all; }
    #veil.white    { background: #fff; }

    /* ── Back button (Room 01 only) ───────────────── */

    #back-btn {
      position: fixed; top: 24px; left: 24px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.55);
      font-family: Georgia, serif; font-size: 10px;
      letter-spacing: .28em; text-transform: uppercase;
      padding: 9px 22px; cursor: pointer; z-index: 50;
      display: none;
      transition: border-color .35s, color .35s;
      outline: none;
    }
    #back-btn:hover { border-color: rgba(255,255,255,.7); color: #fff; }

    /* ── Tooltip (hover over clickable clause) ────── */

    #clause-tip {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% + 3.8rem));
      font-size: 9px; letter-spacing: .32em;
      text-transform: uppercase;
      color: rgba(255,255,255,.38);
      opacity: 0; pointer-events: none; z-index: 50;
      transition: opacity .3s ease;
    }

    /* ── HUD ──────────────────────────────────────── */

    #hud {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      z-index: 10; pointer-events: none; user-select: none;
    }

    #hint {
      font-size: 9px; letter-spacing: .32em;
      text-transform: uppercase;
      color: rgba(255,255,255,.18);
      opacity: 0; transition: opacity 1.8s ease;
    }

    #room-tag {
      font-size: 9px; letter-spacing: .44em;
      text-transform: uppercase;
      color: rgba(255,255,255,.12);
      opacity: 0; transition: opacity 2s ease 1.2s;
    }

    canvas { display: block; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    canvas.hovering { cursor: pointer; }

<script>
(function () {
'use strict';

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */

const WORDS = [

// Void clauses — first entry is the special clickable portal to Room 01
const VOID_CLAUSES = [

  { text:'on the basis of sex',                   bright:1.00, mul:1.72 },

  { text:'or be subjected to discrimination\nunder any education program or\nactivity receiving Federal\nfinancial assistance', bright:0.86, mul:1.15 },

// Room 01 — 4 depth layers, semantically assigned
const R01_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:42, fMax:54, oMin:0.78, oMax:0.96 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:30, fMax:40, oMin:0.48, oMax:0.68 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:22, fMax:30, oMin:0.24, oMax:0.40 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:14, fMax:22, oMin:0.07, oMax:0.19 },
];

// Room 04 — breakthrough, full warm gold, brightest word cloud
const R04_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:44, fMax:56, oMin:0.80, oMax:0.98 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:32, fMax:42, oMin:0.54, oMax:0.74 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:24, fMax:32, oMin:0.28, oMax:0.44 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:16, fMax:24, oMin:0.10, oMax:0.22 },
];

// Room 03 — slightly warmer/brighter than R02, hopeful opening
const R03_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:42, fMax:54, oMin:0.70, oMax:0.90 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:30, fMax:40, oMin:0.42, oMax:0.60 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:22, fMax:30, oMin:0.20, oMax:0.34 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:14, fMax:22, oMin:0.06, oMax:0.16 },
];

// Room 05 — institutional cool blue, fading with depth
const R05_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:42, fMax:54, oMin:0.75, oMax:0.95 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:30, fMax:40, oMin:0.46, oMax:0.64 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:22, fMax:30, oMin:0.22, oMax:0.36 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:14, fMax:22, oMin:0.07, oMax:0.17 },
];

// Blue tint per depth layer — bright institutional blue fading to deep navy
const R05_BLUE = [
  new THREE.Color(0.80, 0.90, 1.00),
  new THREE.Color(0.65, 0.78, 1.00),
  new THREE.Color(0.50, 0.65, 0.95),
  new THREE.Color(0.38, 0.52, 0.88),
];

// Room 06 — final room, maximum vibrant energy
const R06_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:44, fMax:58, oMin:0.85, oMax:1.00 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:32, fMax:44, oMin:0.58, oMax:0.78 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:24, fMax:32, oMin:0.30, oMax:0.48 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:16, fMax:24, oMin:0.12, oMax:0.24 },
];

// Vibrant full-spectrum tints per word index — each word gets its own hue
const R06_SPECTRUM = [
  new THREE.Color(0.20, 1.00, 0.45),  // green
  new THREE.Color(1.00, 0.85, 0.15),  // gold
  new THREE.Color(0.25, 0.75, 1.00),  // sky blue
  new THREE.Color(1.00, 0.40, 0.25),  // orange-red
  new THREE.Color(0.85, 0.30, 1.00),  // purple
  new THREE.Color(0.15, 0.90, 0.85),  // teal
  new THREE.Color(1.00, 0.60, 0.10),  // amber
  new THREE.Color(0.50, 0.90, 0.30),  // lime
  new THREE.Color(0.95, 0.25, 0.55),  // magenta
  new THREE.Color(0.30, 0.60, 1.00),  // periwinkle
];

// Room 02 — same word distribution, slightly darker to feel more urgent
const R02_LAYERS = [
  { idx:[0,6,11,13,18,26,34,35,36],    rMin:2.5, rMax:4.5,  fMin:40, fMax:52, oMin:0.62, oMax:0.84 },
  { idx:[1,4,5,15,20,24,29,30,32,33],  rMin:5.5, rMax:8.5,  fMin:28, fMax:38, oMin:0.36, oMax:0.54 },
  { idx:[3,7,8,9,14,16,17,22,27,28],   rMin:9.5, rMax:14,   fMin:20, fMax:28, oMin:0.16, oMax:0.28 },
  { idx:[2,10,12,19,21,23,25,31],       rMin:15,  rMax:22,   fMin:12, fMax:20, oMin:0.05, oMax:0.14 },
];


/* ═══════════════════════════════════════════
   THREE.JS CORE
═══════════════════════════════════════════ */

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
renderer.domElement.style.display = 'none';

// Two scenes
const voidScene = new THREE.Scene();
voidScene.background = new THREE.Color(0x000000);
voidScene.fog = new THREE.FogExp2(0x000000, 0.037);

const r01Scene = new THREE.Scene();
r01Scene.background = new THREE.Color(0x000000);

const r02Scene = new THREE.Scene();
r02Scene.background = new THREE.Color(0x000000);

const r03Scene = new THREE.Scene();
r03Scene.background = new THREE.Color(0x000000);

const r04Scene = new THREE.Scene();
r04Scene.background = new THREE.Color(0x000000);

const r05Scene = new THREE.Scene();
r05Scene.background = new THREE.Color(0x000000);

const r06Scene = new THREE.Scene();
r06Scene.background = new THREE.Color(0x000000);

const endScene = new THREE.Scene();
endScene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);

let activeScene = voidScene;

/* ═══════════════════════════════════════════
   LOOK CONTROLS
═══════════════════════════════════════════ */

let yaw = 0, pitch = 0, tYaw = 0, tPitch = 0;
let dragging = false, lx = 0, ly = 0, idleRotate = true;
let dragMovedPx = 0, mouseDownX = 0, mouseDownY = 0;
const cvs = renderer.domElement;

function startDrag(x, y) {
  dragging = true; idleRotate = false;
  lx = x; ly = y;
  mouseDownX = x; mouseDownY = y;
  dragMovedPx = 0;
  cvs.classList.add('dragging');
}
function moveDrag(x, y) {
  if (!dragging) return;
  const dx = x - lx, dy = y - ly;
  tYaw   -= dx * 0.0032;
  tPitch -= dy * 0.0032;
  tPitch  = Math.max(-1.35, Math.min(1.35, tPitch));
  lx = x; ly = y;
  dragMovedPx += Math.sqrt(dx*dx + dy*dy);
}
function endDrag(x, y) {
  dragging = false;
  cvs.classList.remove('dragging');
  // If barely moved, treat as a click
  if (dragMovedPx < 6) handleClick(x, y);
}

cvs.addEventListener('mousedown',  e => startDrag(e.clientX, e.clientY));
window.addEventListener('mousemove', e => {
  moveDrag(e.clientX, e.clientY);
  if (!dragging) handleHover(e.clientX, e.clientY);
});
window.addEventListener('mouseup', e => endDrag(e.clientX, e.clientY));
cvs.addEventListener('touchstart', e => {
  const t = e.touches[0]; startDrag(t.clientX, t.clientY);
}, { passive: true });
window.addEventListener('touchmove', e => {
  const t = e.touches[0]; moveDrag(t.clientX, t.clientY);
}, { passive: true });
window.addEventListener('touchend', e => {
  const t = e.changedTouches[0]; endDrag(t.clientX, t.clientY);
});

/* ═══════════════════════════════════════════
   SPRITE FACTORY
═══════════════════════════════════════════ */

const DPR  = Math.min(window.devicePixelRatio, 2);
const KSCL = 1 / (DPR * 245);

function mkSprite(text, { fontSize = 42, bright = 0.75, italic = false, glow = false } = {}) {
  const fs    = fontSize * DPR;
  const font  = `${italic ? 'italic ' : ''}${fs}px Georgia, serif`;
  const lh    = fs * 1.38;
  const glowPad = glow ? fs * 0.65 : 0;
  const px    = fs * 0.36 + glowPad;
  const py    = fs * 0.28 + glowPad;
  const lines = text.split('\n');

  const probe = document.createElement('canvas').getContext('2d');
  probe.font  = font;
  let maxW    = 0;
  for (const l of lines) { const w = probe.measureText(l).width; if (w > maxW) maxW = w; }

  const cw = Math.ceil(maxW + px * 2);
  const ch = Math.ceil(lh * lines.length + py * 2);
  const cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  const ctx = cv.getContext('2d');
  ctx.font  = font;

  const g = Math.round(bright * 255);
  ctx.fillStyle    = `rgb(${g},${g},${g})`;
  ctx.textBaseline = 'top';

  // Glow: multi-pass shadow rendering
  if (glow) {
    ctx.shadowColor = `rgb(${g},${g},${g})`;
    ctx.shadowBlur  = fs * 0.55;
    for (let pass = 0; pass < 3; pass++) {
      for (let i = 0; i < lines.length; i++) {
        const lw = ctx.measureText(lines[i]).width;
        ctx.fillText(lines[i], (cw - lw) * 0.5, py + i * lh);
      }
    }
    ctx.shadowBlur = 0;
  }

  // Crisp final pass
  for (let i = 0; i < lines.length; i++) {
    const lw = ctx.measureText(lines[i]).width;
    ctx.fillText(lines[i], (cw - lw) * 0.5, py + i * lh);
  }

  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity: 0, depthWrite: false
  });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(cw * KSCL, ch * KSCL, 1);
  return sp;
}

/* ═══════════════════════════════════════════
   GRAYSCALE PLANE FACTORY
   Shared ShaderMaterial for both panels so
   colours are always stripped to greyscale.
═══════════════════════════════════════════ */

const GREY_VERT = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const GREY_FRAG = `
  uniform sampler2D uTex;
  uniform float uBright;
  varying vec2 vUv;
  void main() {
    vec4 c = texture2D(uTex, vUv);
    float g = dot(c.rgb, vec3(0.299, 0.587, 0.114)) * uBright;
    gl_FragColor = vec4(g, g, g, c.a);
  }
`;

function mkGreyMesh(tex, w, h, bright) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTex: { value: tex }, uBright: { value: bright } },
    vertexShader: GREY_VERT,
    fragmentShader: GREY_FRAG,
    side: THREE.FrontSide,
  });
  return new THREE.Mesh(geo, mat);
}

/* ═══════════════════════════════════════════
   FULL-COLOR PLANE FACTORY (Room 04 wall)
   Passes texture through unmodified — natural
   colours, no greyscale, no tint.
═══════════════════════════════════════════ */

const COLOR_FRAG = `
  uniform sampler2D uTex;
  varying vec2 vUv;
  void main() {
    gl_FragColor = texture2D(uTex, vUv);
  }
`;

function mkColorMesh(tex, w, h) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTex: { value: tex } },
    vertexShader: GREY_VERT,
    fragmentShader: COLOR_FRAG,
    side: THREE.FrontSide,
  });
  return new THREE.Mesh(geo, mat);
}

/* ═══════════════════════════════════════════
   COOL-BLUE PLANE FACTORY (Room 05 panels)
   Greyscale → cool blue tint for video/paper.
═══════════════════════════════════════════ */

const COOL_FRAG = `
  uniform sampler2D uTex;
  uniform float uBright;
  varying vec2 vUv;
  void main() {
    vec4 c = texture2D(uTex, vUv);
    float g = dot(c.rgb, vec3(0.299, 0.587, 0.114)) * uBright;
    gl_FragColor = vec4(g * 0.72, g * 0.86, g * 1.00, c.a);
  }
`;

function mkCoolMesh(tex, w, h, bright) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTex: { value: tex }, uBright: { value: bright } },
    vertexShader: GREY_VERT,
    fragmentShader: COOL_FRAG,
    side: THREE.FrontSide,
  });
  return new THREE.Mesh(geo, mat);
}

═══════════════════════════════════════════ */

function rndSphere(r0, r1) {
  const r = r0 + Math.random() * (r1 - r0);
  const u = Math.random() * Math.PI * 2;
  const v = Math.acos(2 * Math.random() - 1);
  return new THREE.Vector3(
    r * Math.sin(v) * Math.cos(u),
    r * Math.sin(v) * Math.sin(u),
    r * Math.cos(v)
  );
}

// Void-specific: words appear in a volume in front of the user
function rndVoidPos() {
  return new THREE.Vector3(
    -12 + Math.random() * 24,    // x: -12 to 12
    0.5 + Math.random() * 5.5,   // y: 0.5 to 6
    -(5 + Math.random() * 35)    // z: -5 to -40
  );
}

function ndcFromEvent(cx, cy) {
  return new THREE.Vector2(
    (cx / window.innerWidth)  *  2 - 1,
    (cy / window.innerHeight) * -2 + 1
  );
}

    [WW,  GT,   0,          cy - WH / 2],  // bottom
    [GT,  WH,  -WW / 2,     cy],           // left
    [GT,  WH,   WW / 2,     cy],           // right

    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(w, h),
      r01DoorGlowMat

    mesh.position.set(x, y, glowZ);
    r01Scene.add(mesh);

  // Soft bloom overlay — slightly larger, very dim, behind the edge strips
  r01DoorGroup = new THREE.Mesh(
    new THREE.PlaneGeometry(WW + 0.6, WH + 0.6),
    new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0,

function mkStatPanel(lines, accentColor) {
  // lines: array of {text, size, color} objects
  // Returns a floating canvas-based sprite
  const DPR2 = Math.min(window.devicePixelRatio, 2);
  const CW = 480 * DPR2, CH = 200 * DPR2;
  const cv  = document.createElement('canvas');
  cv.width  = CW; cv.height = CH;
  const ctx = cv.getContext('2d');

  // Background — dark with subtle border
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, CW, CH);
  ctx.strokeStyle = accentColor;
  ctx.lineWidth   = DPR2 * 2;
  ctx.strokeRect(DPR2 * 2, DPR2 * 2, CW - DPR2 * 4, CH - DPR2 * 4);

  ctx.textAlign = 'center';
  let y = DPR2 * 38;
  for (const line of lines) {
    ctx.font      = `${line.bold ? 'bold ' : ''}${line.size * DPR2}px Georgia, serif`;
    ctx.fillStyle = line.color || '#ffffff';
    ctx.fillText(line.text, CW / 2, y);
    y += line.size * DPR2 * 1.5;
  }

  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0, depthWrite: false });
  const sp  = new THREE.Sprite(mat);
  const W   = (CW / DPR2) / 245;
  const H   = (CH / DPR2) / 245;
  sp.scale.set(W, H, 1);
  return sp;
}

/* ═══════════════════════════════════════════
   VOID WORD SCHEDULE
   Called once when user enters the void.
   Activates each word/clause via setTimeout
   in sync with the audio (~0.4 s per word).
═══════════════════════════════════════════ */

// Audio starts at 850 ms after button click.
// Words fire at 850 + wordIndex * 400 ms.
// Clauses fire 300 ms after their last constituent word.
const AUDIO_START_MS   = 850;
const WORD_INTERVAL_MS = 400;

// Word-index boundaries for each clause in VOID_CLAUSES
const CLAUSE_LAST_WORD = [6, 11, 16, 21, 36]; // index of each clause's last word in WORDS[]

function startVoidSequence() {
  playEntryAudio();

  // Individual words (voidItems 0..36)
  WORDS.forEach((_, i) => {
    const ms = AUDIO_START_MS + i * WORD_INTERVAL_MS;
    setTimeout(() => { voidItems[i].active = true; }, ms);
  });

  // Clause phrases (voidItems 37..41)
  VOID_CLAUSES.forEach((_, ci) => {
    const lastWordIdx = CLAUSE_LAST_WORD[ci];
    const ms = AUDIO_START_MS + lastWordIdx * WORD_INTERVAL_MS + 300;
    setTimeout(() => { voidItems[37 + ci].active = true; }, ms);
  });

  // After entry audio ends: build and reveal smoke, path, and door
  entryAudio.onended = () => {
    entryAudio.onended = null;
    buildVoidDoor();
    voidDoorActive = true;
  };
}

let isHoveringClause = false;
let isHoveringDoor   = false;

function handleHover(cx, cy) {
  raycaster.setFromCamera(ndcFromEvent(cx, cy), camera);

  if (activeScene === voidScene && clickableSp && clickableSp.material.opacity > 0.1) {
    const hits = raycaster.intersectObject(clickableSp);
    const hit  = hits.length > 0;
    if (hit !== isHoveringClause) {
      isHoveringClause = hit;
      cvs.classList.toggle('hovering', hit && !isHoveringDoor);
      document.getElementById('clause-tip').style.opacity = hit ? '1' : '0';
    }
  }

  if (activeScene === voidScene && voidDoorHitBox && voidDoorActive) {
    const hits = raycaster.intersectObject(voidDoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r01Scene && r01DoorHitBox) {
    const hits = raycaster.intersectObject(r01DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r02Scene && r02DoorHitBox) {
    const hits = raycaster.intersectObject(r02DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r03Scene && r03DoorHitBox) {
    const hits = raycaster.intersectObject(r03DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r04Scene && r04DoorHitBox) {
    const hits = raycaster.intersectObject(r04DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r05Scene && r05DoorHitBox) {
    const hits = raycaster.intersectObject(r05DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }

  if (activeScene === r06Scene && r06DoorHitBox) {
    const hits = raycaster.intersectObject(r06DoorHitBox);
    const hit  = hits.length > 0;
    if (hit !== isHoveringDoor) { isHoveringDoor = hit; cvs.classList.toggle('hovering', hit); }
  }
}

function handleClick(cx, cy) {
  raycaster.setFromCamera(ndcFromEvent(cx, cy), camera);

  if (activeScene === voidScene && clickableSp && clickableSp.material.opacity > 0.1) {
    const hits = raycaster.intersectObject(clickableSp);
    if (hits.length > 0) { enterRoom01(); return; }
  }

  if (activeScene === voidScene && voidDoorHitBox && voidDoorActive) {
    const hits = raycaster.intersectObject(voidDoorHitBox);
    if (hits.length > 0) { enterRoom01(); return; }
  }

  if (activeScene === r01Scene && r01DoorHitBox) {
    const hits = raycaster.intersectObject(r01DoorHitBox);
    if (hits.length > 0) { enterRoom02(); return; }
  }

  if (activeScene === r02Scene && r02DoorHitBox) {
    const hits = raycaster.intersectObject(r02DoorHitBox);
    if (hits.length > 0) { enterRoom03(); return; }
  }

  if (activeScene === r03Scene && r03DoorHitBox) {
    const hits = raycaster.intersectObject(r03DoorHitBox);
    if (hits.length > 0) { enterRoom04(); return; }
  }

  if (activeScene === r04Scene && r04DoorHitBox) {
    const hits = raycaster.intersectObject(r04DoorHitBox);
    if (hits.length > 0) { enterRoom05(); return; }
  }

  if (activeScene === r05Scene && r05DoorHitBox) {
    const hits = raycaster.intersectObject(r05DoorHitBox);
    if (hits.length > 0) { enterRoom06(); return; }
  }

  if (activeScene === r06Scene && r06DoorHitBox) {
    const hits = raycaster.intersectObject(r06DoorHitBox);
    if (hits.length > 0) enterEnding();
  }
}

  camera.rotation.x = pitch;

  if (activeScene === voidScene && voidActive) {
    if (voidT0 === null) voidT0 = ts;
    const t = (ts - voidT0) * 0.001;

      const mat = d.sp.material;
      if (d.active && mat.opacity < d.tOp) {
        mat.opacity = Math.min(d.tOp, mat.opacity + 0.009);
      }
      if (mat.opacity > 0.001) {
        const s = t * d.spd;
        d.sp.position.x = d.bp.x + Math.sin(s         + d.ph)  * d.amp;
        d.sp.position.y = d.bp.y + Math.cos(s * 0.63   + d.phY) * d.amp * 0.75;

      const ud = mesh.userData;
      if (ud.initialY !== undefined) {
        mesh.position.y = ud.initialY + Math.sin(t * 0.38 + ud.bobPhase) * ud.bobAmp;
        mesh.rotation.y = ud.baseRotY  + Math.sin(t * 0.25 + ud.rotPhase) * 0.04;
      }
    }

    // Door glow
    if (r06DoorGlowMat) {
      if (r06WallGlowActive || isHoveringDoor) {
        const base  = isHoveringDoor ? 0.70 : 0.30;
        const range = isHoveringDoor ? 0.25 : 0.22;
        const glow  = base + range * Math.sin(t * 1.6);
        r06DoorGlowMat.opacity = glow;
        if (r06DoorGroup && r06DoorGroup.material) r06DoorGroup.material.opacity = glow * 0.12;
      } else {
        r06DoorGlowMat.opacity = 0;
        if (r06DoorGroup && r06DoorGroup.material) r06DoorGroup.material.opacity = 0;
      }
    }

    // Final text — fade in after 90s, gentle pulse once visible
    if (r06FinalSp) {
      if (r06FinalActive && r06FinalSp.material.opacity < 0.96) {
        r06FinalSp.material.opacity = Math.min(0.96, r06FinalSp.material.opacity + 0.004);
      } else if (r06FinalSp.material.opacity >= 0.96) {
        r06FinalSp.material.opacity = 0.84 + 0.12 * (0.5 + 0.5 * Math.sin(t * 0.7));
      }
      r06FinalSp.position.y = 2.5 + Math.sin(t * 0.18) * 0.06;
    }
  }

  // ── ENDING ROOM (The Legacy)
  if (activeScene === endScene) {
    if (endT0 === null) endT0 = ts;
    const t = (endT0 === ts ? 0 : (ts - endT0) * 0.001);

    // Word + stat sprites fade in
    for (const d of endItems) {
      const mat = d.sp.material;
      if (t > d.delay && mat.opacity < d.tOp) {
        mat.opacity = Math.min(d.tOp, mat.opacity + 0.007);
      }
      if (mat.opacity > 0.001) {
        const s = t * d.spd;
        d.sp.position.x = d.bp.x + Math.sin(s        + d.ph)  * d.amp;
        d.sp.position.y = d.bp.y + Math.cos(s * 0.63  + d.phY) * d.amp * 0.75;
        d.sp.position.z = d.bp.z + Math.sin(s * 0.47  + d.ph + 1.8) * d.amp * 0.55;
      }
    }

    // Video panel — fade in after audio ends (video starts playing)
    for (const mesh of endMeshes) {
      if (!mesh.material || !mesh.material.transparent) continue;
      const ud = mesh.userData;
      if (endVideoEl && !endVideoEl.paused && mesh.material.opacity < 0.98) {
        mesh.material.opacity = Math.min(0.98, mesh.material.opacity + 0.012);
      }
      if (ud.initialY !== undefined && mesh.material.opacity > 0.01) {
        mesh.position.y = ud.initialY + Math.sin(t * 0.32 + ud.bobPhase) * ud.bobAmp;
      }
    }

    // "She Got Next" — fade in at 90s, big slow pulse
    if (endFinalSp) {
      if (endFinalActive && endFinalSp.material.opacity < 0.98) {
        endFinalSp.material.opacity = Math.min(0.98, endFinalSp.material.opacity + 0.003);
      } else if (endFinalSp.material.opacity >= 0.98) {
        endFinalSp.material.opacity = 0.80 + 0.18 * (0.5 + 0.5 * Math.sin(t * 0.6));
      }
      endFinalSp.position.y = 2.5 + Math.sin(t * 0.15) * 0.10;
    }
  }

  renderer.render(activeScene, camera);
})(0);


/* ═══════════════════════════════════════════
   ENTER SEQUENCE
═══════════════════════════════════════════ */

// ── Staggered landing text fade-in on page load
(function initLanding() {
  // Ensure video plays (some browsers need a small delay)
  const lv = document.getElementById('landing-video');
  if (lv) { lv.muted = true; lv.play().catch(() => {}); }

  setTimeout(() => {
    document.getElementById('landing-title').style.opacity = '1';
  }, 400);
  setTimeout(() => {
    document.getElementById('landing-subtitle').style.opacity = '1';
  }, 1500);
  setTimeout(() => {
    document.getElementById('landing-tagline').style.opacity = '1';
  }, 2600);
  setTimeout(() => {
    document.getElementById('enter-btn').style.opacity = '1';
  }, 3800);
})();

document.getElementById('enter-btn').addEventListener('click', () => {
  document.getElementById('landing').classList.add('out');
  renderer.domElement.style.display = 'block';

  voidActive = true;
  idleRotate = true;

  // Start audio + schedule word appearances
  startVoidSequence();

  setTimeout(() => {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('room-tag').style.opacity = '1';
    const hint = document.getElementById('hint');
    hint.style.opacity = '1';
    setTimeout(() => { hint.style.opacity = '0'; }, 9000);
  }, 2900);
});

document.getElementById('back-btn').addEventListener('click', () => {
  if      (activeScene === r06Scene) returnToRoom05();
  else if (activeScene === r05Scene) returnToRoom04();
  else if (activeScene === r04Scene) returnToRoom03();
  else if (activeScene === r03Scene) returnToRoom02();
  else if (activeScene === r02Scene) returnToRoom01();
  else returnToVoid();
});

/* ═══════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════ */

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>
